name: Release

# One-shot release: bump the version, build a binary for every platform, and
# publish — all in a single run. The main `remnem` package is a thin Node
# launcher; the actual compiled CLI ships in the per-platform
# `@leonsilicon/remnem-<platform>` optional-dependency packages, one binary each.

env:
  APP_NAME: remnem

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

permissions:
  contents: write
  id-token: write

jobs:
  version:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version (main + all npm sub-packages)
        id: bump
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version --ignore-scripts >/dev/null
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"
          # Sync every npm/* sub-package version AND the main package's
          # optionalDependencies ranges to the new root version.
          node -e '
            const fs = require("fs");
            const version = require("./package.json").version;
            const pkg = JSON.parse(fs.readFileSync("./package.json", "utf8"));
            for (const dep of Object.keys(pkg.optionalDependencies ?? {})) {
              pkg.optionalDependencies[dep] = version;
            }
            fs.writeFileSync("./package.json", JSON.stringify(pkg, null, 2) + "\n");
            for (const dir of fs.readdirSync("./npm")) {
              const p = `./npm/${dir}/package.json`;
              if (!fs.existsSync(p)) continue;
              const sub = JSON.parse(fs.readFileSync(p, "utf8"));
              sub.version = version;
              fs.writeFileSync(p, JSON.stringify(sub, null, 2) + "\n");
            }
          '
      - name: Commit and tag
        run: |
          git add -A
          git commit -m "${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags

  build:
    name: build - ${{ matrix.settings.target }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            npm_dir: darwin-x64
          - host: macos-latest
            target: aarch64-apple-darwin
            npm_dir: darwin-arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            npm_dir: win32-x64-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            npm_dir: win32-arm64-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm_dir: linux-x64-gnu
            zig: true
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            npm_dir: linux-x64-musl
            zig: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            npm_dir: linux-arm64-gnu
            zig: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            npm_dir: linux-arm64-musl
            zig: true
    runs-on: ${{ matrix.settings.host }}
    steps:
      # Check out the release commit the `version` job just pushed.
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Setup Zig
        if: ${{ matrix.settings.zig }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: ${{ matrix.settings.zig }}
        run: cargo install cargo-zigbuild --locked
      - name: Build (native)
        if: ${{ !matrix.settings.zig }}
        run: cargo build --release --target ${{ matrix.settings.target }}
        shell: bash
      - name: Build (zig cross)
        if: ${{ matrix.settings.zig }}
        run: cargo zigbuild --release --target ${{ matrix.settings.target }}
        shell: bash
      - name: Stage binary into its npm package
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.settings.host }}" == windows-* ]]; then
            cp "target/${{ matrix.settings.target }}/release/${APP_NAME}.exe" \
               "npm/${{ matrix.settings.npm_dir }}/${APP_NAME}.exe"
          else
            cp "target/${{ matrix.settings.target }}/release/${APP_NAME}" \
               "npm/${{ matrix.settings.npm_dir }}/${APP_NAME}"
            chmod +x "npm/${{ matrix.settings.npm_dir }}/${APP_NAME}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.settings.target }}
          path: |
            npm/${{ matrix.settings.npm_dir }}/${{ env.APP_NAME }}
            npm/${{ matrix.settings.npm_dir }}/${{ env.APP_NAME }}.exe
          if-no-files-found: error

  publish:
    name: Publish
    needs:
      - version
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Place each binary into its npm package
        shell: bash
        run: |
          set -euo pipefail
          # Map each downloaded artifact (named binary-<target>) into the right
          # npm/<platform> directory by matching on the target triple.
          declare -A MAP=(
            [x86_64-apple-darwin]=darwin-x64
            [aarch64-apple-darwin]=darwin-arm64
            [x86_64-pc-windows-msvc]=win32-x64-msvc
            [aarch64-pc-windows-msvc]=win32-arm64-msvc
            [x86_64-unknown-linux-gnu]=linux-x64-gnu
            [x86_64-unknown-linux-musl]=linux-x64-musl
            [aarch64-unknown-linux-gnu]=linux-arm64-gnu
            [aarch64-unknown-linux-musl]=linux-arm64-musl
          )
          for target in "${!MAP[@]}"; do
            dir="artifacts/binary-${target}"
            [ -d "$dir" ] || { echo "missing artifact for $target"; exit 1; }
            npmdir="npm/${MAP[$target]}"
            if [ -f "$dir/${APP_NAME}.exe" ]; then
              cp "$dir/${APP_NAME}.exe" "$npmdir/${APP_NAME}.exe"
            else
              cp "$dir/${APP_NAME}" "$npmdir/${APP_NAME}"
              chmod +x "$npmdir/${APP_NAME}"
            fi
          done
          ls -R npm
      - name: Publish to npm
        # Publish every per-platform package first (they are the optional
        # dependencies), then the main launcher package.
        run: |
          npm config set access public
          for dir in npm/*/; do
            (cd "$dir" && npm publish --access public --provenance)
          done
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
