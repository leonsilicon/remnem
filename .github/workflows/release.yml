name: Release

# Manually cut a release. Pick the semver bump (or an exact version); this bumps
# the main package AND every per-platform npm/* sub-package to the same version,
# commits it with a bare-semver message, and pushes to main. The CI workflow's
# `publish` job detects that bare-semver commit and publishes everything to npm
# once all platform builds + tests pass.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

permissions:
  contents: write
  actions: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: bun install
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version (main + all npm sub-packages)
        run: |
          # Bump the root package.json without creating npm's own tag/commit and
          # WITHOUT running lifecycle scripts. `--ignore-scripts` is essential:
          # this package has a `version` npm script (`napi version`), which npm
          # would otherwise run during `npm version` and print `> ...` lines to
          # stdout, corrupting the captured value.
          npm version ${{ inputs.bump }} --no-git-tag-version --ignore-scripts >/dev/null
          # Read the bumped version straight from package.json (robust — does not
          # depend on npm's stdout format).
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          echo "Bumped to $NEW_VERSION"
          # `napi version` rewrites every npm/* sub-package's own version to
          # match the root version.
          bunx napi version
          # `napi version` does NOT touch the main package's optionalDependencies
          # ranges, so sync those to the new version too — otherwise the published
          # main package would depend on the previous version of each platform
          # package and fail to install.
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("./package.json", "utf8"));
            for (const dep of Object.keys(pkg.optionalDependencies ?? {})) {
              pkg.optionalDependencies[dep] = pkg.version;
            }
            fs.writeFileSync("./package.json", JSON.stringify(pkg, null, 2) + "\n");
          '
      - name: Commit and push
        run: |
          git add -A
          # Bare-semver commit message is the signal the CI publish job matches.
          git commit -m "$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD --tags
      - name: Dispatch the CI build+publish run for this release commit
        # A push authored by GITHUB_TOKEN does not trigger `on: push`, so kick the
        # CI workflow off explicitly. CI checks out the ref, sees the bare-semver
        # HEAD commit message, and publishes.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run CI --ref main
