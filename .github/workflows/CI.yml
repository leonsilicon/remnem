name: CI

env:
  APP_NAME: remnem

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - LICENSE
      - '**/*.gitignore'
      - .editorconfig
  pull_request: null

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # `npm_dir` is the per-platform package under npm/ that ships this
          # target's compiled binary; `zig` marks targets we cross-compile with
          # cargo-zigbuild (the Linux ones).
          - host: macos-latest
            target: x86_64-apple-darwin
            npm_dir: darwin-x64
          - host: macos-latest
            target: aarch64-apple-darwin
            npm_dir: darwin-arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            npm_dir: win32-x64-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            npm_dir: win32-arm64-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm_dir: linux-x64-gnu
            zig: true
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            npm_dir: linux-x64-musl
            zig: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            npm_dir: linux-arm64-gnu
            zig: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            npm_dir: linux-arm64-musl
            zig: true
    name: build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - name: Setup Zig
        # The Linux targets cross-compile with cargo-zigbuild (uses Zig as the C
        # cross-toolchain), which lets one ubuntu host produce gnu and musl,
        # x64 and arm64 binaries without per-arch apt cross toolchains.
        if: ${{ matrix.settings.zig }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: ${{ matrix.settings.zig }}
        run: cargo install cargo-zigbuild --locked
      - name: Build (native)
        if: ${{ !matrix.settings.zig }}
        run: cargo build --release --target ${{ matrix.settings.target }}
        shell: bash
      - name: Build (zig cross)
        if: ${{ matrix.settings.zig }}
        run: cargo zigbuild --release --target ${{ matrix.settings.target }}
        shell: bash
      - name: Stage binary into its npm package
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.settings.host }}" == windows-* ]]; then
            cp "target/${{ matrix.settings.target }}/release/${APP_NAME}.exe" \
               "npm/${{ matrix.settings.npm_dir }}/${APP_NAME}.exe"
          else
            cp "target/${{ matrix.settings.target }}/release/${APP_NAME}" \
               "npm/${{ matrix.settings.npm_dir }}/${APP_NAME}"
            chmod +x "npm/${{ matrix.settings.npm_dir }}/${APP_NAME}"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.settings.target }}
          path: |
            npm/${{ matrix.settings.npm_dir }}/${{ env.APP_NAME }}
            npm/${{ matrix.settings.npm_dir }}/${{ env.APP_NAME }}.exe
          if-no-files-found: error

  test:
    name: smoke - ${{ matrix.settings.target }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
            npm_dir: darwin-arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            npm_dir: win32-x64-msvc
            exe: .exe
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm_dir: linux-x64-gnu
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.settings.target }}
          path: npm/${{ matrix.settings.npm_dir }}
      - name: Smoke test the binary
        shell: bash
        run: |
          chmod +x "npm/${{ matrix.settings.npm_dir }}/${APP_NAME}${{ matrix.settings.exe }}" || true
          node ./__test__/smoke.mjs "npm/${{ matrix.settings.npm_dir }}/${APP_NAME}${{ matrix.settings.exe }}"
